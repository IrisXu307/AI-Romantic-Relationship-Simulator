simulation:
  age_start: 25
  age_end: 80

agents:
  # X traits are sampled uniformly from [x_init_low, x_init_high] at episode start
  x_init_low: 0.2
  x_init_high: 0.8
  # Base std for perceptual noise added to observations.
  # Actual noise std = obs_noise_scale * (1 - effective_eq).
  # Agents with higher EQ perceive themselves and their partner more accurately.
  obs_noise_scale: 0.05

reflection:
  # |delta_y| on any single Y variable must exceed this to trigger reflection
  threshold: 0.15
  # max absolute change applied to any X trait during reflection
  x_change_magnitude: 0.05

# Per-agent reward weights over Y state variables.
# Different weights encode different life priorities, creating genuine
# multi-agent tension — no single "perfect" strategy satisfies both partners.
reward:
  agent_h:
    happiness_weight: 0.5
    stability_weight: 0.3
    wealth_weight: 0.2
  agent_w:
    happiness_weight: 0.6
    stability_weight: 0.4
    wealth_weight: 0.0

training:
  learning_rate: 0.001
  gamma: 0.99        # discount factor for future rewards
  episodes: 1000000
  hidden_dim: 64
  seed: 42

ppo:
  clip_eps: 0.2      # PPO clipping epsilon
  epochs: 4          # update passes per episode
  gae_lambda: 0.95   # GAE smoothing factor
  entropy_coef: 0.01 # entropy bonus weight
