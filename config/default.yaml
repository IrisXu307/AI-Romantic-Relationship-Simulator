simulation:
  age_start: 25
  age_end: 80

agents:
  # X traits are sampled uniformly from [x_init_low, x_init_high] at episode start
  x_init_low: 0.05
  x_init_high: 0.95
  # Base std for perceptual noise added to self-observations.
  # Actual noise std = obs_noise_scale * (1 - effective_eq).
  # Agents with higher EQ perceive themselves more accurately.
  obs_noise_scale: 0.05
  # Base std for partner-model noise. Actual noise std = partner_obs_noise_scale * (1 - trust).
  # High trust → partner traits estimated accurately; low trust → noisy partner model.
  partner_obs_noise_scale: 0.08

reflection:
  # |delta_y| on any single Y variable must exceed this to trigger reflection
  threshold: 0.15
  # default max X trait change for minor events; major events override via REFLECTION_MAGNITUDES
  x_change_magnitude: 0.05

social_support:
  # Couple's external support network strength — sampled uniformly at episode start.
  # Isolated couples (low social_support) take harder hits from negative events.
  init_low: 0.30
  init_high: 0.90
  # Multiplier on negative base event impact: effective = 1 + amplifier * (1 - social_support)
  # At social_support=1.0 → no amplification; at 0.0 → 1 + amplifier × impact
  isolation_amplifier: 0.30

# Per-agent reward weights over Y state variables.
# Different weights encode different life priorities, creating genuine
# multi-agent tension — no single "perfect" strategy satisfies both partners.
reward:
  agent_h:
    happiness_weight: 0.5
    stability_weight: 0.3
    wealth_weight: 0.2
  agent_w:
    happiness_weight: 0.6
    stability_weight: 0.4
    wealth_weight: 0.0

training:
  learning_rate: 0.0003
  gamma: 0.99        # discount factor for future rewards
  episodes: 1000000
  hidden_dim: 128
  seed: 42

ppo:
  clip_eps: 0.15     # tighter clipping to compensate for more epochs
  epochs: 8          # more gradient steps per episode batch
  gae_lambda: 0.95   # GAE smoothing factor
  entropy_start: 0.05  # higher initial exploration to encourage personality-based differentiation
  entropy_end:   0.005 # retain some exploration at end
  update_every: 4    # collect this many episodes before each PPO update
